## Live overlay — same services as services.yaml, but every write/tool kind
## flipped to `mode: live` over the webhook transport, pointed at the
## placeholder ("tenant") backend (placeholders/backend.py).
##
## Opt in by pointing the gateway/agent at this file:
##     SERVICES_CONFIG=services.live.yaml
##     WEBHOOK_BASE_URL=http://localhost:8090     # placeholder backend
##     WEBHOOK_SECRET=<hmac secret shared with the backend>
##
## base_url resolves to ${WEBHOOK_BASE_URL}/{service_id}; the backend serves
## POST /{service_id}/{capability}. Knowledge/search kinds stay mock (read-only,
## no external tenant system to stand up for a demo).
version: 1
tenant: acme

services:
  - id: sales-scheduler
    kind: scheduling
    mode: live
    description: >
      Books product demo calls with the sales team. 30 or 60 minute slots,
      business hours US-Eastern.
    routing_hints: ["demo", "sales call", "talk to sales"]
    capabilities: [list_services, get_availability, hold_slot, confirm_booking, cancel_booking]
    ui_blocks: [scheduler, confirmation]
    live:
      transport: webhook
      base_url: ${WEBHOOK_BASE_URL}/sales-scheduler
      auth: env://WEBHOOK_SECRET
      timeout_ms: 4000

  - id: support-calendar
    kind: scheduling
    mode: live
    description: Books support callbacks, 15-minute slots, 24/7.
    routing_hints: ["support call", "callback"]
    capabilities: [get_availability, hold_slot, confirm_booking]
    ui_blocks: [scheduler, confirmation]
    live:
      transport: webhook
      base_url: ${WEBHOOK_BASE_URL}/support-calendar
      auth: env://WEBHOOK_SECRET
      timeout_ms: 4000

  - id: order-lookup
    kind: custom
    mode: live
    description: Looks up order status and shipment tracking by order number or email.
    tools:
      - name: get_order_status
        description: Look up an order's status by order number or email.
        input_schema:
          type: object
          required: [order_ref]
          properties:
            order_ref: { type: string }
        output_schema:
          type: object
          properties:
            status: { type: string }
            eta: { type: string }
    ui_blocks: [text]
    mock:
      fixtures: fixtures/orders.json
    live:
      transport: webhook
      base_url: ${WEBHOOK_BASE_URL}/order-lookup
      auth: env://WEBHOOK_SECRET
      timeout_ms: 4000

  - id: help-center
    kind: faq
    mode: mock
    description: Curated FAQ for common product and billing questions.
    routing_hints: ["pricing", "billing", "refunds", "account"]
    capabilities: [lookup]
    ui_blocks: [faq_card]
    mock:
      fixtures: fixtures/faqs.json

  - id: docs-kb
    kind: knowledge_base
    mode: mock
    description: Product documentation knowledge base. Answers must cite sources.
    routing_hints: ["how does", "explain", "documentation"]
    capabilities: [retrieve]
    ui_blocks: [kb_answer]
    mock:
      fixtures: fixtures/kb-chunks.json

  - id: site-search
    kind: site_search
    mode: mock
    description: Searches the website for pages by topic.
    routing_hints: ["find", "where is", "page", "link"]
    capabilities: [search]
    ui_blocks: [search_results]
    mock:
      fixtures: fixtures/pages.json

  - id: sales-crm
    kind: crm
    mode: live
    description: Captures sales and support leads (name, email, message).
    routing_hints: ["contact", "get in touch", "talk to sales", "callback request"]
    capabilities: [capture_lead]
    ui_blocks: [form, handoff]
    live:
      transport: webhook
      base_url: ${WEBHOOK_BASE_URL}/sales-crm
      auth: env://WEBHOOK_SECRET
      timeout_ms: 4000
